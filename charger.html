<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#071b2c">
<title>ES90 350kW 초고속 충전 네트워크</title>
<style>
:root{--navy:#102a43;--deep:#071b2c;--orange:#f46832;--orange2:#d6520a;--ink:#172b3a;--muted:#667c8d;--faint:#8fa0ac;--line:#d9e2e8;--soft:#eef2f5;--green:#2f7d55}
*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--ink);font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif}button,input{font:inherit}button{cursor:pointer}
.top{position:sticky;top:0;z-index:20;background:rgba(7,27,44,.97);box-shadow:0 8px 28px rgba(7,27,44,.18)}.top-in{max-width:1280px;min-height:72px;margin:auto;padding:12px 22px;display:flex;align-items:center;justify-content:space-between}
.back{border:1px solid rgba(255,255,255,.22);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;padding:10px 14px;font-size:12px;font-weight:700}.brand{color:#fff;text-align:right;font-size:14px;font-weight:800;letter-spacing:2.2px}.brand small{display:block;margin-top:3px;color:rgba(255,255,255,.55);font-size:8px;letter-spacing:.8px}
main{max-width:1280px;margin:auto;padding:24px 20px 44px}.hero{position:relative;overflow:hidden;border-radius:18px;padding:30px;background:linear-gradient(135deg,var(--deep),var(--navy) 62%,#385a72);color:#fff;box-shadow:0 14px 38px rgba(16,42,67,.1)}.hero:after{content:"350";position:absolute;right:20px;top:-35px;color:rgba(255,255,255,.045);font-size:190px;font-weight:900}.kicker{position:relative;z-index:1;color:#ffae83;font-size:10px;font-weight:800;letter-spacing:1.5px}.hero h1{position:relative;z-index:1;margin:7px 0 6px;font-size:clamp(26px,4vw,42px);line-height:1.15}.hero p{position:relative;z-index:1;margin:0;color:rgba(255,255,255,.68);font-size:13px}.sample{position:relative;z-index:1;display:inline-block;margin-top:17px;padding:7px 10px;border:1px solid rgba(255,174,131,.34);border-radius:999px;background:rgba(244,104,50,.14);color:#ffd0b8;font-size:10px;font-weight:700}
.search{position:relative;z-index:3;margin:-14px 18px 0;padding:16px;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:0 12px 30px rgba(16,42,67,.09)}.search-row{display:grid;grid-template-columns:auto minmax(220px,1fr) 48px;gap:9px}.loc,.go{border:0;border-radius:8px;color:#fff;font-size:12px;font-weight:800}.loc{padding:0 16px;background:var(--orange)}.go{background:var(--navy)}.search input{height:42px;border:1px solid var(--line);border-radius:8px;background:#f8fafb;padding:0 13px;outline:none}.chips{display:flex;gap:7px;margin-top:11px;overflow:auto}.chip{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);padding:7px 11px;font-size:10px;font-weight:700}.chip.on{border-color:#e7a17d;background:#fff3ed;color:var(--orange2)}
.grid{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(340px,.85fr);gap:15px;margin-top:18px}.panel{overflow:hidden;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:0 8px 25px rgba(16,42,67,.06)}.head{min-height:56px;padding:13px 16px;border-bottom:1px solid #e9eef2;display:flex;align-items:center;justify-content:space-between}.title{font-size:13px;font-weight:800}.note{color:var(--faint);font-size:9.5px}
.map{position:relative;min-height:500px;overflow:hidden;background:linear-gradient(90deg,rgba(255,255,255,.7) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.7) 1px,transparent 1px),linear-gradient(135deg,#d9e8e0,#dce6ed 60%,#e7e0d4);background-size:44px 44px,44px 44px,100% 100%}.road{position:absolute;width:130%;height:34px;left:-14%;top:46%;border:1px solid #fff;background:rgba(255,255,255,.65);transform:rotate(-18deg)}.river{position:absolute;left:-6%;right:-6%;top:66%;height:56px;border-radius:50%;background:rgba(137,188,215,.48);transform:rotate(-7deg)}
.pin{position:absolute;z-index:2;width:38px;height:38px;border:3px solid #fff;border-radius:50% 50% 50% 10%;background:var(--orange);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:900;box-shadow:0 8px 16px rgba(16,42,67,.23);transform:rotate(-45deg)}.pin span{transform:rotate(45deg)}.pin.sel{width:46px;height:46px;background:var(--deep)}.p1{left:25%;top:22%}.p2{left:58%;top:38%}.p3{left:72%;top:18%}.p4{left:39%;top:69%}.p5{left:78%;top:72%}.legend{position:absolute;z-index:3;left:14px;bottom:14px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.92);color:var(--muted);font-size:9px}
.list{max-height:500px;overflow:auto;padding:8px}.station{width:100%;margin-bottom:7px;padding:13px;border:1px solid #e9eef2;border-radius:10px;background:#fff;text-align:left}.station:hover,.station.sel{border-color:#e6a07c;background:#fff9f6}.station-top{display:flex;justify-content:space-between;gap:9px}.name{font-size:12px;font-weight:800}.distance{color:var(--orange2);font-size:11px;font-weight:900}.meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px}.power{padding:4px 7px;border-radius:5px;background:var(--navy);color:#fff;font-size:9px;font-weight:800}.status{color:var(--green);font-size:9px;font-weight:700}.operator{color:var(--faint);font-size:9px}.address{display:block;margin-top:8px;color:var(--muted);font-size:9.5px}.actions{display:flex;gap:6px;margin-top:10px}.mini{border:1px solid var(--line);border-radius:6px;padding:6px 9px;color:var(--navy);font-size:9px;font-weight:800}.mini.route{border-color:var(--navy);background:var(--navy);color:#fff}
footer{display:flex;justify-content:space-between;gap:16px;margin-top:16px;padding:0 4px;color:var(--faint);font-size:9px;line-height:1.6}.toast{position:fixed;left:50%;bottom:28px;z-index:50;padding:12px 18px;border-radius:9px;background:rgba(7,27,44,.96);color:#fff;font-size:11px;font-weight:700;opacity:0;transform:translate(-50%,14px);transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:850px){.grid{grid-template-columns:1fr}.map{min-height:390px}.list{max-height:none}}@media(max-width:600px){main{padding:14px 12px 32px}.top-in{min-height:62px;padding:9px 13px}.brand small{display:none}.hero{padding:23px 19px}.hero:after{font-size:120px}.search{margin:-8px 6px 0;padding:12px}.search-row{grid-template-columns:1fr 46px}.loc{grid-column:1/-1;height:40px}.map{min-height:330px}footer{flex-direction:column}}
</style>
</head>
<body>
<header class="top"><div class="top-in"><button class="back" onclick="goBack()">← ES90 경쟁력 분석</button><div class="brand">VOLVO ES90<small>ULTRA-FAST CHARGING NETWORK</small></div></div></header>
<main>
  <section class="hero"><div class="kicker">ES90 CHARGING GUIDE</div><h1>350kW 초고속 충전 네트워크</h1><p>현재 위치와 목적지 주변에서 ES90의 장거리 이동에 적합한 초고속 충전소를 빠르게 찾아보세요.</p><div class="sample">● 화면 검토용 샘플 데이터</div></section>
  <section class="search"><div class="search-row"><button class="loc" onclick="sampleNotice()">⌖ 현재 위치로 찾기</button><input id="query" placeholder="지역명 또는 충전소명 검색" aria-label="충전소 검색"><button class="go" onclick="render()">⌕</button></div><div class="chips"><button class="chip on">350kW 이상</button><button class="chip">현재 사용 가능</button><button class="chip">24시간 운영</button><button class="chip">가까운 거리순</button></div></section>
  <div class="grid">
    <section class="panel"><div class="head"><div class="title">충전소 지도</div><div class="note">샘플 위치 · 실제 API 연결 예정</div></div><div class="map"><div class="road"></div><div class="river"></div><button class="pin p1 sel" data-i="0"><span>1</span></button><button class="pin p2" data-i="1"><span>2</span></button><button class="pin p3" data-i="2"><span>3</span></button><button class="pin p4" data-i="3"><span>4</span></button><button class="pin p5" data-i="4"><span>5</span></button><div class="legend">⚡ 350kW 이상 충전소만 표시</div></div></section>
    <section class="panel"><div class="head"><div class="title">가까운 충전소 <span id="count">5</span></div><div class="note">거리순</div></div><div class="list" id="list"></div></section>
  </div>
  <footer><span>충전소명·위치·상태는 UI 검토용 샘플이며 실제 운영정보가 아닙니다.</span><span>실서비스 적용 시 한국환경공단 공식 API 연결 예정</span></footer>
</main>
<div class="toast" id="toast"></div>
<script>
const data=[
['서울역 초고속 충전 허브',2.4,350,'3기 사용 가능','샘플 네트워크 A','서울특별시 중구 한강대로 인근'],
['강남 센트럴 충전 라운지',5.8,400,'1기 사용 가능 · 2기 충전 중','샘플 네트워크 B','서울특별시 강남구 테헤란로 인근'],
['하남 EV 플래그십',12.6,350,'4기 사용 가능','샘플 네트워크 A','경기도 하남시 미사대로 인근'],
['판교 테크노밸리 충전소',18.3,350,'전체 충전 중','샘플 네트워크 C','경기도 성남시 분당구 판교역로 인근'],
['인천공항 초고속 충전소',46.1,400,'상태 확인 필요','샘플 네트워크 D','인천광역시 중구 공항로 인근']];
let selected=0;
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function render(){const q=document.getElementById('query').value.trim().toLowerCase();const rows=data.map((x,i)=>({x,i})).filter(o=>o.x.join(' ').toLowerCase().includes(q));document.getElementById('count').textContent=rows.length;document.getElementById('list').innerHTML=rows.length?rows.map(o=>`<button class="station ${o.i===selected?'sel':''}" data-i="${o.i}"><span class="station-top"><span class="name">${esc(o.x[0])}</span><span class="distance">${o.x[1].toFixed(1)}km</span></span><span class="meta"><span class="power">⚡ ${o.x[2]}kW</span><span class="status">● ${esc(o.x[3])}</span><span class="operator">${esc(o.x[4])}</span></span><span class="address">${esc(o.x[5])} · 24시간</span><span class="actions"><span class="mini">상세정보</span><span class="mini route">길찾기</span></span></button>`).join(''):'<div style="padding:32px;text-align:center;color:#667c8d;font-size:11px">검색 결과가 없습니다.</div>';document.querySelectorAll('.station').forEach(b=>b.onclick=()=>select(+b.dataset.i))}
function select(i){selected=i;document.querySelectorAll('.pin').forEach(p=>p.classList.toggle('sel',+p.dataset.i===i));render()}
function sampleNotice(){const t=document.getElementById('toast');t.textContent='샘플 화면입니다. 실제 API 연결 시 현재 위치를 사용합니다.';t.classList.add('show');clearTimeout(sampleNotice.t);sampleNotice.t=setTimeout(()=>t.classList.remove('show'),2200)}
function goBack(){if(document.referrer&&new URL(document.referrer).origin===location.origin)history.back();else location.href='./app.html'}
document.querySelectorAll('.pin').forEach(p=>p.onclick=()=>select(+p.dataset.i));
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');sampleNotice()});
document.getElementById('query').oninput=render;render();
</script>
</body>
</html>
