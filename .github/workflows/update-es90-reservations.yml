name: ES90 예약고객 자동 업데이트

on:
  schedule:
    # 한국시간 기준 매일 09:00, 12:00, 15:00, 18:00에 실행됩니다.
    # GitHub Actions의 cron은 UTC 기준이므로 한국시간보다 9시간 이전으로 설정합니다.
    - cron: "0 0,3,6,9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: es90-reservation-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 자동 브라우저 준비
        run: |
          python -m pip install --disable-pip-version-check playwright==1.54.0
          python -m playwright install --with-deps chromium

      - name: Daily Report에서 ES90 데이터 수집
        env:
          VOLVO_SALES_ID: ${{ secrets.VOLVO_SALES_ID }}
          VOLVO_SALES_PASSWORD: ${{ secrets.VOLVO_SALES_PASSWORD }}
        run: python scripts/update_es90_reservations.py

      - name: 변경된 데이터 배포
        run: |
          if git diff --quiet -- app.html automation/es90-reservation-state.json; then
            echo "변경된 ES90 데이터가 없습니다."
            exit 0
          fi

          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          path = Path("version.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          parts = data["version"].split(".")
          parts[-1] = str(int(parts[-1]) + 1)
          data["version"] = ".".join(parts)
          data["updatedAt"] = datetime.now(ZoneInfo("Asia/Seoul")).isoformat(timespec="seconds")
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

          git config user.name "ES90 Auto Update"
          git config user.email "actions@users.noreply.github.com"
          git add app.html automation/es90-reservation-state.json version.json
          git commit -m "Auto update ES90 reservations"
          git push
